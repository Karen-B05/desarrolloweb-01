<!-- Page 1 -->

<html>
<head>
    <!-- Título de la pestaña del navegador y configuración para caracteres y estilos-->
    <title>Desarrollo Web A00840405</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href= "style.css" />
</head>
<body>
     <!-- Encabezado -->
    <div id="header"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function(){
            const token = localStorage.getItem("token");
            if(!token){
                window.location.href = "login.html";
            }
        });
    </script>

    <div class="pokedex">
        <form id="controlsForm">
            <h1 class="poketitulo">Pokédex</h1>
            <div class="pokebuscador">
                <input type="text" id="q" placeholder="Ej: pikachu, fire, 132...">
                <button onclick="buscarPokemon()">Buscar</button>
            </div>
            <select id="typeFilter">
                <option value="">Todos los tipos</option>
            </select>
            <select id="sortBy">
                <option value="id-asc">ID Ascendente</option>
                <option value="id-desc">ID Descendente</option>
                <option value="name-asc">Nombre A-Z</option>
                <option value="name-desc">Nombre Z-A</option>
            </select>
        </form>
        <main id="results" class="pokemon-grid"></main>
        <div class="loadmore-container">
            <button id="loadMore">Cargar más</button>
        </div>
        <template id="pokemon-card-template">
            <div class="pokemon-card">
                <img class="card-img">
                <h2 class="pokemon-name"></h2>
                <p class="pokemon-id"></p>
                <div class="types">
                </div>
                <h3>Habilidades</h3>
                <ul class="ability-list"></ul>
                <h3>Stats</h3>
                <ul class="stats-list"></ul>
            </div>
        </template>
    </div>

    <!-- Pie de página -->
    <div id="footer"></div>
    <script src="function.js"></script>
</body>
</html>
