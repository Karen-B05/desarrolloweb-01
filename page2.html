<!-- Page 2 -->

<html>
<head>
    <!-- Título de la pestaña del navegador y configuración para caracteres y estilos-->
    <title>Desarrollo Web A00840405</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href= "style.css" />
</head>
<body>
     <!-- Encabezado -->
    <div id="header"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function(){
            const token = localStorage.getItem("token");
            if(!token){
                window.location.href = "login.html";
            }
        });
    </script>

    <h1>Batalla Pokémon</h1>
    <datalist id="pokemon-list"></datalist>
    <div id="selection-screen" class="active">
        <input type="text" id="poke1-input" list="pokemon-list" placeholder="Ej. Pikachu">
        <p>VS</p>
        <input type="text" id="poke2-input" list="pokemon-list" placeholder="Ej. Ditto">
        <button onclick="iniciarBatalla()">Iniciar batalla</button>
    </div>
    
    <div id="battle-screen">
        <div class="battle-container">
            <div class="pokemon-box">
                <h2 id="p1-name">Pokémon 1</h2>
                <img id="p1-img">
                <div class="hp-bar">
                    <div id="p1-hp-bar"></div>
                </div>
                <p>HP: <span id="p1-hp-text">100</span>%</p>
            </div>
            <div class="pokemon-box">
                <h2 id="p2-name">Pokémon 2</h2>
                <img id="p2-img">
                <div class="hp-bar">
                    <div id="p2-hp-bar"></div>
                </div>
                <p>HP: <span id="p2-hp-text">100</span>%</p>
            </div>
        </div>
        <h3 id="narrator-text">¡Preparando el combate!</h3>
        <ul id="log-list"></ul>
    </div>
    <div id="winner-screen">
        <h1>GANADOR</h1>
        <h2 id="winner-name"></h2>
        <img id="winner-img">
        <br><br>
        <button onclick="reiniciarBatalla()">Otra batalla</button>
    </div>


    <!-- Pie de página -->
    <div id="footer"></div>
    <script src="function.js"></script>
    <script src="batalla.js"></script>
</body>
</html>
